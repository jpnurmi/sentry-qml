name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.runner }}, Qt ${{ matrix.qt_version }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # List available Qt versions and architectures with:
        #   pipx run aqtinstall aqt list-qt linux desktop
        #   pipx run aqtinstall aqt list-qt linux_arm64 desktop
        #   pipx run aqtinstall aqt list-qt mac desktop
        #   pipx run aqtinstall aqt list-qt windows desktop
        #   pipx run aqtinstall aqt list-qt linux desktop --arch 6.11.0
        include:
          - runner: ubuntu-24.04
            qt_version: "6.8.0"
            qt_host: linux
            qt_arch: linux_gcc_64
          - runner: ubuntu-24.04
            qt_version: "6.11.0"
            qt_host: linux
            qt_arch: linux_gcc_64
          - runner: ubuntu-24.04-arm
            qt_version: "6.8.0"
            qt_host: linux_arm64
            qt_arch: linux_gcc_arm64
          - runner: ubuntu-24.04-arm
            qt_version: "6.11.0"
            qt_host: linux_arm64
            qt_arch: linux_gcc_arm64
          - runner: macos-15
            qt_version: "6.8.0"
            qt_host: mac
            qt_arch: clang_64
          - runner: macos-15-intel
            qt_version: "6.8.0"
            qt_host: mac
            qt_arch: clang_64
          - runner: macos-26
            qt_version: "6.11.0"
            qt_host: mac
            qt_arch: clang_64
          - runner: macos-26-intel
            qt_version: "6.11.0"
            qt_host: mac
            qt_arch: clang_64
          - runner: windows-2025
            qt_version: "6.8.0"
            qt_host: windows
            qt_arch: win64_msvc2022_64
          - runner: windows-2025
            qt_version: "6.11.0"
            qt_host: windows
            qt_arch: win64_msvc2022_64
          - runner: windows-11-arm
            qt_version: "6.8.0"
            qt_host: windows
            qt_arch: win64_msvc2022_arm64_cross_compiled
          - runner: windows-11-arm
            qt_version: "6.11.0"
            qt_host: windows
            qt_arch: win64_msvc2022_arm64_cross_compiled

    steps:
      - name: Check out sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install system dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libcurl4-openssl-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ matrix.qt_version }}
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          cache: true
          install-deps: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Test
        run: ctest --test-dir build --build-config RelWithDebInfo --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen
