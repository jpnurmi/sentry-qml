name: E2E

on:
  pull_request:
  workflow_dispatch:
    inputs:
      self_hosted_ref:
        description: getsentry/self-hosted ref to test
        required: true
        default: "26.4.0"
      compose_profiles:
        description: Sentry self-hosted Docker Compose profile
        required: true
        type: choice
        default: feature-complete
        options:
          - feature-complete
          - errors-only

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: ${{ matrix.sentry_backend || matrix.sentry_sdk }} (Qt ${{ matrix.qt }}, ${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - {sentry_backend: Inproc, runner: ubuntu-24.04, qt: LTS}
          - {sentry_backend: Crashpad, runner: ubuntu-24.04, qt: LTS}
          - {sentry_backend: Native, runner: ubuntu-24.04, qt: stable}
          - {sentry_sdk: Android, runner: ubuntu-24.04, qt: LTS, android: true}
    env:
      SENTRY_COMPOSE_PROFILES: ${{ inputs.compose_profiles || 'feature-complete' }}
      SENTRY_SELF_HOSTED_REF: ${{ inputs.self_hosted_ref || '26.4.0' }}
      SENTRY_TEST_URL: http://127.0.0.1:9000
      SENTRY_TEST_EMAIL: test@example.com
      SENTRY_TEST_PASSWORD: test123TEST
      SENTRY_APP_RUNNER_REF: d6f83b1ba5bfeb24a86ef5dd8d6cffa2ef4f56ab

    steps:
      - name: Check out sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Read Qt version
        id: qt
        shell: pwsh
        run: |
          $qtTrack = "${{ matrix.qt }}".ToLowerInvariant()
          $versionProperty = Get-Content "modules/qt-$qtTrack.properties" | Where-Object { $_ -match '^\s*version\s*=' } | Select-Object -First 1
          if (-not $versionProperty) { throw "Could not read Qt version" }
          $qtVersion = (($versionProperty -split '=', 2)[1]).Trim() -replace '^v', ''
          if (-not $qtVersion) { throw "Could not read Qt version" }
          "version=$qtVersion" >> $env:GITHUB_OUTPUT

      - name: Install Qt
        if: matrix.android != true
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ steps.qt.outputs.version }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true
          install-deps: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Install host Qt
        if: matrix.android == true
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ steps.qt.outputs.version }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          dir: ${{ runner.temp }}/qt-host
          cache: true
          install-deps: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Find host Qt path
        if: matrix.android == true
        id: qt-host-path
        shell: pwsh
        run: |
          $path = Get-ChildItem "${{ runner.temp }}/qt-host" -Directory -Recurse -Filter gcc_64 |
            Select-Object -First 1
          if (-not $path) { throw "Could not find host Qt installation" }
          "path=$($path.FullName)" >> $env:GITHUB_OUTPUT

      - name: Install Android Qt
        if: matrix.android == true
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ steps.qt.outputs.version }}
          host: linux
          target: android
          arch: android_x86_64
          dir: ${{ runner.temp }}/qt-android
          cache: true
          install-deps: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Install Crashpad dependencies
        if: matrix.sentry_backend == 'Crashpad' && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure Sentry QML
        if: matrix.android != true
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DSENTRY_BACKEND=${{ matrix.sentry_backend }}
          -DSENTRY_QML_BUILD_E2E_TESTS=ON

      - name: Configure Sentry QML for Android
        if: matrix.android == true
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_TOOLCHAIN_FILE="$Qt6_DIR/lib/cmake/Qt6/qt.toolchain.cmake"
          -DQT_HOST_PATH="${{ steps.qt-host-path.outputs.path }}"
          -DANDROID_ABI=x86_64
          -DANDROID_PLATFORM=android-28
          -DSENTRY_QML_SDK=android
          -DSENTRY_QML_BUILD_E2E_TESTS=ON

      - name: Build E2E app
        if: matrix.android != true
        run: cmake --build build --target sentry_qml_e2e_app --config RelWithDebInfo --parallel

      - name: Build Android test APKs
        if: matrix.android == true
        run: >
          cmake --build build
          --target
          tst_unit_make_apk
          tst_integration_make_apk
          sentry_qml_e2e_app_make_apk
          --config RelWithDebInfo
          --parallel

      - name: Find Android E2E APK
        if: matrix.android == true
        id: android-apk
        shell: pwsh
        run: |
          $apk = Get-ChildItem build -Filter '*.apk' -Recurse |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $apk) { throw "Could not find Android E2E APK" }
          "path=$($apk.FullName)" >> $env:GITHUB_OUTPUT

      - name: Free runner disk space
        if: matrix.android != true
        run: |
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /home/runner/Android /usr/local/lib/android /opt/android /usr/local/android-sdk
          sudo rm -rf /usr/share/dotnet /usr/share/doc/dotnet-*
          df -h

      - name: Free runner disk space
        if: matrix.android == true
        run: |
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/dotnet /usr/share/doc/dotnet-*
          df -h

      - name: Check out Sentry self-hosted
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: getsentry/self-hosted
          ref: ${{ env.SENTRY_SELF_HOSTED_REF }}
          path: self-hosted
          persist-credentials: false

      - name: Check out Sentry app-runner
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: getsentry/app-runner
          ref: ${{ env.SENTRY_APP_RUNNER_REF }}
          path: app-runner
          persist-credentials: false

      - name: Configure Sentry self-hosted
        working-directory: self-hosted
        run: |
          cat > .env.custom <<EOF
          COMPOSE_PROFILES=$SENTRY_COMPOSE_PROFILES
          SENTRY_BIND=127.0.0.1:9000
          SENTRY_EVENT_RETENTION_DAYS=1
          EOF

      - name: Restore Sentry self-hosted volume cache
        id: restore-self-hosted-volumes
        uses: BYK/docker-volume-cache-action/restore@0efa5cf5178c9906cb46ed8d1a357df8fd6b1a06 # v1
        with:
          key: sentry-qml-e2e-volumes-v1-${{ runner.arch }}-${{ env.SENTRY_SELF_HOSTED_REF }}-${{ env.SENTRY_COMPOSE_PROFILES }}
          volumes: |
            sentry-postgres
            sentry-clickhouse
            sentry-kafka

      - name: Install Sentry self-hosted
        working-directory: self-hosted
        env:
          REPORT_SELF_HOSTED_ISSUES: 0
          SKIP_SENTRY_MIGRATIONS: ${{ steps.restore-self-hosted-volumes.outputs.cache-hit == 'true' && '1' || '' }}
          SKIP_SNUBA_MIGRATIONS: ${{ steps.restore-self-hosted-volumes.outputs.cache-hit == 'true' && '1' || '' }}
        run: ./install.sh --no-report-self-hosted-issues --skip-user-creation --skip-commit-check

      - name: Enable Sentry E2E feature flags
        working-directory: self-hosted
        run: |
          cat >> sentry/sentry.conf.py <<'EOF'

          SENTRY_FEATURES.update(
              {
                  "organizations:tracemetrics-ingestion": True,
              }
          )
          EOF

      - name: Save Sentry self-hosted volume cache
        if: github.event_name != 'pull_request' && steps.restore-self-hosted-volumes.outputs.cache-hit != 'true'
        uses: BYK/docker-volume-cache-action/save@0efa5cf5178c9906cb46ed8d1a357df8fd6b1a06 # v1
        with:
          key: sentry-qml-e2e-volumes-v1-${{ runner.arch }}-${{ env.SENTRY_SELF_HOSTED_REF }}-${{ env.SENTRY_COMPOSE_PROFILES }}
          volumes: |
            sentry-postgres
            sentry-clickhouse
            sentry-kafka

      - name: Set up swap
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show
          free -h

      - name: Start Sentry self-hosted
        working-directory: self-hosted
        run: docker compose --ansi never --env-file .env --env-file .env.custom up --wait

      - name: Create Sentry test user
        working-directory: self-hosted
        run: |
          docker compose --ansi never --env-file .env --env-file .env.custom exec -T web sentry createuser \
            --force-update \
            --superuser \
            --email "$SENTRY_TEST_EMAIL" \
            --password "$SENTRY_TEST_PASSWORD" \
            --no-input

      - name: Configure Sentry test project
        id: sentry
        run: |
          python3 tests/e2e/sentry_self_hosted.py \
            --base-url "$SENTRY_TEST_URL" \
            --email "$SENTRY_TEST_EMAIL" \
            --password "$SENTRY_TEST_PASSWORD" \
            configure

      - name: Run Sentry QML E2E tests
        if: matrix.android != true
        shell: pwsh
        run: Invoke-Pester tests/e2e/Integration.Tests.ps1 -CI
        env:
          SENTRY_APP_RUNNER_PATH: ${{ github.workspace }}/app-runner
          SENTRY_AUTH_TOKEN: ${{ steps.sentry.outputs.auth_token }}
          SENTRY_QML_E2E_DSN: ${{ steps.sentry.outputs.dsn }}
          SENTRY_QML_E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          SENTRY_QML_E2E_APP_PATH: ${{ github.workspace }}/build/tests/sentry_qml_e2e_app
          SENTRY_QML_E2E_DATABASE_PATH: ${{ runner.temp }}/sentry-qml-e2e-db

      - name: Enable KVM group perms
        if: matrix.android == true
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Sentry QML Android tests
        if: matrix.android == true
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          script: |
            ctest --test-dir build --build-config RelWithDebInfo --output-on-failure -R 'tst_(unit|integration)'
            pwsh -NoLogo -NoProfile -Command "Invoke-Pester tests/e2e/Integration.Tests.ps1 -CI"
        env:
          SENTRY_APP_RUNNER_PATH: ${{ github.workspace }}/app-runner
          SENTRY_AUTH_TOKEN: ${{ steps.sentry.outputs.auth_token }}
          SENTRY_QML_E2E_DSN: ${{ steps.sentry.outputs.dsn }}
          SENTRY_QML_E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          SENTRY_QML_E2E_APP_PACKAGE_PATH: ${{ steps.android-apk.outputs.path }}
          SENTRY_QML_E2E_APP_PATH: io.sentry.qml.e2e/org.qtproject.qt.android.bindings.QtActivity
          SENTRY_QML_E2E_DATABASE_PATH: /data/data/io.sentry.qml.e2e/cache/sentry-qml-e2e-db
          SENTRY_QML_E2E_PLATFORM: Adb

      - name: Inspect Sentry failure
        if: failure()
        run: |
          test -d self-hosted || exit 0
          cd self-hosted
          docker compose --ansi never --env-file .env --env-file .env.custom ps
          docker compose --ansi never --env-file .env --env-file .env.custom logs --tail=300

      - name: Upload E2E output
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sentry-qml-e2e-output
          path: tests/e2e/output/
          if-no-files-found: ignore

      - name: Stop Sentry self-hosted
        if: always()
        run: |
          test -d self-hosted || exit 0
          cd self-hosted
          docker compose --ansi never --env-file .env --env-file .env.custom down --remove-orphans || true
