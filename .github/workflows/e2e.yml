name: E2E

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: ${{ matrix.name }}
    if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Inproc (Qt LTS, ubuntu-24.04)
            sentry_backend: Inproc
            runner: ubuntu-24.04
            qt: LTS
            qt_host: linux
            qt_arch: linux_gcc_64
          - name: Crashpad (Qt LTS, ubuntu-24.04)
            sentry_backend: Crashpad
            runner: ubuntu-24.04
            qt: LTS
            qt_host: linux
            qt_arch: linux_gcc_64
          - name: Native (Qt latest, ubuntu-24.04)
            sentry_backend: Native
            runner: ubuntu-24.04
            qt: latest
            qt_host: linux
            qt_arch: linux_gcc_64
          - name: WebAssembly (Qt LTS, single-threaded)
            sentry_sdk: Wasm
            runner: ubuntu-24.04
            qt: LTS
            qt_host: all_os
            qt_target: wasm
            qt_arch: wasm_singlethread
            host_qt_host: linux
            host_qt_arch: linux_gcc_64
            cmake_toolchain_file: lib/cmake/Qt6/qt.toolchain.cmake
          - name: Android (Qt LTS, API 35)
            sentry_sdk: Android
            runner: ubuntu-24.04
            qt: LTS
            android_api: 35
            qt_host: linux
            qt_target: android
            qt_arch: android_x86_64
            cmake_toolchain_file: lib/cmake/Qt6/qt.toolchain.cmake
            cmake_target_args: -DANDROID_ABI=x86_64 -DANDROID_PLATFORM=android-28
          - name: iOS (Qt LTS, simulator)
            sentry_sdk: iOS
            runner: macos-15-intel
            qt: LTS
            qt_host: mac
            qt_target: ios
            qt_arch: ios
            host_qt_host: mac
            host_qt_arch: clang_64
            cmake_generator: Xcode
            cmake_toolchain_file: lib/cmake/Qt6/qt.toolchain.cmake
            cmake_target_args: -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphonesimulator -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO
    env:
      SENTRY_APP_RUNNER_REF: d6f83b1ba5bfeb24a86ef5dd8d6cffa2ef4f56ab
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      SENTRY_TEST_URL: https://sentry.io

    steps:
      - name: Check out sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Validate hosted Sentry configuration
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_QML_E2E_DSN: ${{ secrets.SENTRY_QML_E2E_DSN }}
        run: |
          missing=()
          for name in SENTRY_AUTH_TOKEN SENTRY_QML_E2E_DSN SENTRY_ORG SENTRY_PROJECT; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -ne 0 ]; then
            printf 'Missing hosted Sentry configuration: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Read Qt version
        id: qt
        shell: pwsh
        run: |
          $qtTrack = "${{ matrix.qt }}".ToLowerInvariant()
          $versionProperty = Get-Content "modules/qt-$qtTrack.properties" | Where-Object { $_ -match '^\s*version\s*=' } | Select-Object -First 1
          if (-not $versionProperty) { throw "Could not read Qt version" }
          $qtVersion = (($versionProperty -split '=', 2)[1]).Trim() -replace '^v', ''
          if (-not $qtVersion) { throw "Could not read Qt version" }
          "version=$qtVersion" >> $env:GITHUB_OUTPUT

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ steps.qt.outputs.version }}
          host: ${{ matrix.qt_host }}
          target: ${{ matrix.qt_target || 'desktop' }}
          arch: ${{ matrix.qt_arch }}
          cache: true
          install-deps: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Install host Qt
        if: matrix.qt_target
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ steps.qt.outputs.version }}
          host: ${{ matrix.host_qt_host || 'linux' }}
          target: desktop
          arch: ${{ matrix.host_qt_arch || 'linux_gcc_64' }}
          dir: ${{ runner.temp }}/qt-host
          cache: true
          install-deps: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Find target Qt paths
        if: matrix.qt_target
        id: qt-target-paths
        shell: pwsh
        run: |
          $hostPath = $null
          $hostRoots = @(
            "${{ runner.temp }}/qt-host",
            $env:GITHUB_WORKSPACE,
            (Split-Path $env:GITHUB_WORKSPACE -Parent),
            $env:RUNNER_TEMP,
            $env:RUNNER_TOOL_CACHE
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique
          foreach ($root in $hostRoots) {
            $hostPath = Get-ChildItem $root -Directory -Recurse -ErrorAction SilentlyContinue |
              Where-Object {
                (Test-Path (Join-Path $_.FullName 'bin/qt-cmake')) -and
                (Test-Path (Join-Path $_.FullName 'lib/cmake/Qt6/Qt6Config.cmake'))
              } |
              Select-Object -First 1
            if ($hostPath) { break }
          }
          if (-not $hostPath) { throw "Could not find host Qt installation" }

          $targetPath = $null
          $roots = @(
            $env:GITHUB_WORKSPACE,
            (Split-Path $env:GITHUB_WORKSPACE -Parent),
            $env:RUNNER_TEMP,
            $env:RUNNER_TOOL_CACHE
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique
          foreach ($root in $roots) {
            $targetPath = Get-ChildItem $root -Directory -Recurse -Filter "${{ matrix.qt_arch }}" -ErrorAction SilentlyContinue |
              Where-Object { Test-Path (Join-Path $_.FullName 'lib/cmake/Qt6/qt.toolchain.cmake') } |
              Select-Object -First 1
            if ($targetPath) { break }
          }
          if (-not $targetPath) { throw "Could not find target Qt installation" }

          "host_path=$($hostPath.FullName)" >> $env:GITHUB_OUTPUT
          "target_path=$($targetPath.FullName)" >> $env:GITHUB_OUTPUT

          $helperPath = Join-Path $targetPath.FullName 'lib/cmake/Qt6/QtPublicWasmToolchainHelpers.cmake'
          if (Test-Path $helperPath) {
            $helperText = Get-Content $helperPath -Raw
            if ($helperText -notmatch 'QT_EMCC_RECOMMENDED_VERSION\s+"([^"]+)"') {
              throw "Could not read recommended Emscripten version from $helperPath"
            }
            "emscripten_version=$($Matches[1])" >> $env:GITHUB_OUTPUT
          }

      - name: Restore Sentry Native cache
        if: ${{ !matrix.qt_target }}
        id: sentry-native-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/sentry-native
          key: sentry-native-${{ matrix.runner }}-${{ matrix.qt_arch }}-${{ matrix.sentry_backend }}-${{ hashFiles('modules/qt-*.properties', 'cmake/native.cmake') }}
          restore-keys: |
            sentry-native-${{ matrix.runner }}-${{ matrix.qt_arch }}-${{ matrix.sentry_backend }}-

      - name: Restore Gradle cache
        if: matrix.sentry_sdk == 'Android'
        id: gradle-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ runner.arch }}-api-${{ matrix.android_api }}-${{ hashFiles('modules/qt-*.properties', 'cmake/android.cmake') }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ runner.arch }}-api-${{ matrix.android_api }}-
            gradle-${{ runner.os }}-${{ runner.arch }}-

      - name: Check out emsdk
        if: matrix.sentry_sdk == 'Wasm'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: emscripten-core/emsdk
          path: emsdk
          persist-credentials: false

      - name: Restore Emscripten cache
        if: matrix.sentry_sdk == 'Wasm'
        id: emsdk-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            emsdk/.emscripten
            emsdk/.emscripten_cache
            emsdk/.emscripten_sanity
            emsdk/downloads
            emsdk/node
            emsdk/python
            emsdk/upstream
          key: emsdk-${{ runner.os }}-${{ steps.qt-target-paths.outputs.emscripten_version }}

      - name: Install Emscripten
        if: matrix.sentry_sdk == 'Wasm'
        run: |
          "$GITHUB_WORKSPACE/emsdk/emsdk" install "${{ steps.qt-target-paths.outputs.emscripten_version }}"
          "$GITHUB_WORKSPACE/emsdk/emsdk" activate "${{ steps.qt-target-paths.outputs.emscripten_version }}"
          echo "EMSDK=$GITHUB_WORKSPACE/emsdk" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/emsdk" >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Save Emscripten cache
        if: matrix.sentry_sdk == 'Wasm' && steps.emsdk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            emsdk/.emscripten
            emsdk/.emscripten_cache
            emsdk/.emscripten_sanity
            emsdk/downloads
            emsdk/node
            emsdk/python
            emsdk/upstream
          key: ${{ steps.emsdk-cache.outputs.cache-primary-key }}

      - name: Read SentryObjC cache key
        if: matrix.qt_target == 'ios'
        id: sentryobjc-cache-key
        run: |
          sentry_cocoa_sha=$(git -C modules/sentry-cocoa rev-parse HEAD)
          xcode_hash=$(xcodebuild -version | shasum -a 256 | cut -d ' ' -f1)
          echo "key=sentryobjc-ios-${{ runner.os }}-${{ runner.arch }}-$xcode_hash-$sentry_cocoa_sha" >> "$GITHUB_OUTPUT"

      - name: Restore SentryObjC iOS XCFramework
        if: matrix.qt_target == 'ios'
        id: sentryobjc-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/sentry-cocoa
          key: ${{ steps.sentryobjc-cache-key.outputs.key }}
          restore-keys: |
            sentryobjc-ios-${{ runner.os }}-${{ runner.arch }}-

      - name: Build SentryObjC iOS XCFramework
        if: matrix.qt_target == 'ios' && steps.sentryobjc-cache.outputs.cache-matched-key == ''
        run: |
          cd modules/sentry-cocoa
          ./scripts/build-xcframework-local.sh iOSOnly SentryObjCOnly
          mkdir -p "$RUNNER_TEMP/sentry-cocoa"
          ditto -x -k XCFrameworkBuildPath/SentryObjC-Dynamic.xcframework.zip "$RUNNER_TEMP/sentry-cocoa"

      - name: Save SentryObjC iOS XCFramework
        if: matrix.qt_target == 'ios' && steps.sentryobjc-cache.outputs.cache-matched-key == ''
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/sentry-cocoa
          key: ${{ steps.sentryobjc-cache-key.outputs.key }}

      - name: Install Crashpad dependencies
        if: matrix.sentry_backend == 'Crashpad' && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure Sentry QML
        if: ${{ !matrix.qt_target }}
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DSENTRY_BACKEND=${{ matrix.sentry_backend }}
          -DSENTRY_QML_BUILD_E2E_TESTS=ON

      - name: Configure Sentry QML for target platform
        if: matrix.qt_target
        run: >
          cmake -S . -B build
          ${{ matrix.cmake_generator && format('-G "{0}"', matrix.cmake_generator) || '' }}
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_TOOLCHAIN_FILE="${{ steps.qt-target-paths.outputs.target_path }}/${{ matrix.cmake_toolchain_file }}"
          -DQT_HOST_PATH="${{ steps.qt-target-paths.outputs.host_path }}"
          -DSENTRY_QML_SDK=${{ matrix.sentry_sdk }}
          ${{ matrix.qt_target == 'ios' && format('-DSENTRY_COCOA_XCFRAMEWORK="{0}/sentry-cocoa/SentryObjC-Dynamic.xcframework"', runner.temp) || '' }}
          ${{ matrix.cmake_target_args }}
          -DSENTRY_QML_BUILD_E2E_TESTS=ON

      - name: Build E2E app
        run: |
          target=sentry_qml_e2e_app
          if [ "${{ matrix.qt_target }}" = "android" ]; then
            target=sentry_qml_e2e_app_make_apk
          fi
          cmake --build build --target "$target" --config RelWithDebInfo --parallel

      - name: Save Sentry Native cache
        if: ${{ !matrix.qt_target && steps.sentry-native-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/sentry-native
          key: ${{ steps.sentry-native-cache.outputs.cache-primary-key }}

      - name: Save Gradle cache
        if: matrix.sentry_sdk == 'Android' && steps.gradle-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ steps.gradle-cache.outputs.cache-primary-key }}

      - name: Restore WebAssembly npm cache
        if: matrix.sentry_sdk == 'Wasm'
        id: wasm-npm-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: wasm-npm-${{ runner.os }}-${{ hashFiles('tests/e2e/wasm/package-lock.json') }}

      - name: Install WebAssembly E2E dependencies
        if: matrix.sentry_sdk == 'Wasm'
        working-directory: tests/e2e/wasm
        run: npm ci

      - name: Save WebAssembly npm cache
        if: matrix.sentry_sdk == 'Wasm' && steps.wasm-npm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: ${{ steps.wasm-npm-cache.outputs.cache-primary-key }}

      - name: Build WebAssembly Sentry browser bundle
        if: matrix.sentry_sdk == 'Wasm'
        working-directory: tests/e2e/wasm
        run: npm run build:sentry

      - name: Restore WebAssembly browser cache
        if: matrix.sentry_sdk == 'Wasm'
        id: wasm-browser-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: wasm-playwright-${{ runner.os }}-${{ hashFiles('tests/e2e/wasm/package-lock.json') }}

      - name: Install WebAssembly browser
        if: matrix.sentry_sdk == 'Wasm'
        working-directory: tests/e2e/wasm
        run: npx playwright install --with-deps chromium

      - name: Save WebAssembly browser cache
        if: matrix.sentry_sdk == 'Wasm' && steps.wasm-browser-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ steps.wasm-browser-cache.outputs.cache-primary-key }}

      - name: Find Android E2E APK
        if: matrix.qt_target == 'android'
        id: android-apk
        shell: pwsh
        run: |
          $apk = Get-ChildItem build -Filter '*.apk' -Recurse |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $apk) { throw "Could not find Android E2E APK" }
          "path=$($apk.FullName)" >> $env:GITHUB_OUTPUT

      - name: Find iOS E2E app
        if: matrix.qt_target == 'ios'
        id: ios-app
        shell: pwsh
        run: |
          $app = Get-ChildItem build -Filter 'sentry_qml_e2e_app.app' -Directory -Recurse |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $app) { throw "Could not find iOS E2E app bundle" }
          $bundleId = & /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' (Join-Path $app.FullName 'Info.plist')
          if (-not $bundleId) { throw "Could not read iOS bundle identifier" }
          "path=$($app.FullName)" >> $env:GITHUB_OUTPUT
          "bundle_id=$bundleId" >> $env:GITHUB_OUTPUT

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/.ghcup
          if [ "$RUNNER_OS" = "Linux" ] && [ "${{ matrix.qt_target }}" != "android" ]; then
            sudo rm -rf /home/runner/Android /usr/local/lib/android /opt/android /usr/local/android-sdk
          fi
          sudo rm -rf /usr/share/dotnet /usr/share/doc/dotnet-*
          df -h

      - name: Check out Sentry app-runner
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: getsentry/app-runner
          ref: ${{ env.SENTRY_APP_RUNNER_REF }}
          path: app-runner
          persist-credentials: false

      - name: Run Sentry QML E2E tests
        if: ${{ !matrix.qt_target }}
        shell: pwsh
        run: Invoke-Pester tests/e2e/Integration.Tests.ps1 -CI
        env:
          SENTRY_APP_RUNNER_PATH: ${{ github.workspace }}/app-runner
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_QML_E2E_DSN: ${{ secrets.SENTRY_QML_E2E_DSN }}
          SENTRY_QML_E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          SENTRY_QML_E2E_APP_PATH: ${{ github.workspace }}/build/tests/sentry_qml_e2e_app
          SENTRY_QML_E2E_DATABASE_PATH: ${{ runner.temp }}/sentry-qml-e2e-db

      - name: Run Sentry QML WebAssembly tests
        if: matrix.sentry_sdk == 'Wasm'
        shell: pwsh
        run: Invoke-Pester tests/e2e/Integration.Tests.ps1 -CI
        env:
          SENTRY_APP_RUNNER_PATH: ${{ github.workspace }}/app-runner
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_QML_E2E_DSN: ${{ secrets.SENTRY_QML_E2E_DSN }}
          SENTRY_QML_E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          SENTRY_QML_E2E_APP_PATH: ${{ github.workspace }}/build/tests/sentry_qml_e2e_app.html
          SENTRY_QML_E2E_DATABASE_PATH: sentry-qml-e2e-db
          SENTRY_QML_E2E_PLATFORM: WasmBrowser

      - name: Enable KVM group perms
        if: matrix.qt_target == 'android'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Sentry QML Android tests
        if: matrix.qt_target == 'android'
        id: first-android-e2e-run
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with: &android-e2e-run
          api-level: ${{ matrix.android_api }}
          target: google_apis
          arch: x86_64
          script: pwsh -NoLogo -NoProfile -Command "Invoke-Pester tests/e2e/Integration.Tests.ps1 -CI"
        env: &android-e2e-env
          SENTRY_APP_RUNNER_PATH: ${{ github.workspace }}/app-runner
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_QML_E2E_DSN: ${{ secrets.SENTRY_QML_E2E_DSN }}
          SENTRY_QML_E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          SENTRY_QML_E2E_APP_PACKAGE_PATH: ${{ steps.android-apk.outputs.path }}
          SENTRY_QML_E2E_APP_PATH: io.sentry.qml.e2e/org.qtproject.qt.android.bindings.QtActivity
          SENTRY_QML_E2E_DATABASE_PATH: /data/data/io.sentry.qml.e2e/cache/sentry-qml-e2e-db
          SENTRY_QML_E2E_PLATFORM: Adb

      - name: Run Sentry QML iOS tests
        if: matrix.qt_target == 'ios'
        id: first-ios-e2e-run
        continue-on-error: true
        shell: pwsh
        run: Invoke-Pester tests/e2e/Integration.Tests.ps1 -CI
        env: &ios-e2e-env
          SENTRY_APP_RUNNER_PATH: ${{ github.workspace }}/app-runner
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_QML_E2E_DSN: ${{ secrets.SENTRY_QML_E2E_DSN }}
          SENTRY_QML_E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          SENTRY_QML_E2E_APP_PACKAGE_PATH: ${{ steps.ios-app.outputs.path }}
          SENTRY_QML_E2E_APP_PATH: ${{ steps.ios-app.outputs.bundle_id }}
          SENTRY_QML_E2E_DATABASE_PATH: sentry-qml-e2e-db
          SENTRY_QML_E2E_PLATFORM: iOSSimulator

      - name: Retry Sentry QML iOS tests
        if: matrix.qt_target == 'ios' && steps.first-ios-e2e-run.outcome == 'failure'
        shell: pwsh
        run: Invoke-Pester tests/e2e/Integration.Tests.ps1 -CI
        env: *ios-e2e-env

      - name: Retry Sentry QML Android tests
        if: matrix.qt_target == 'android' && steps.first-android-e2e-run.outcome == 'failure'
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with: *android-e2e-run
        env: *android-e2e-env

      - name: Upload E2E output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentry-qml-e2e-output-${{ matrix.sentry_backend || matrix.sentry_sdk }}-${{ matrix.qt_target || 'desktop' }}
          path: tests/e2e/output/
          if-no-files-found: ignore
