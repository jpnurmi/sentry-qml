name: Update Dependencies

on:
  schedule:
    - cron: '30 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  sentry-sdks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Sentry Native SDK
            path: modules/sentry-native
            pattern: '^v?[0-9]+\.[0-9]+\.[0-9]+$'
          - name: Sentry Cocoa SDK
            path: modules/sentry-cocoa
            pattern: '^v?[0-9]+\.[0-9]+\.[0-9]+$'
    steps:
      - uses: getsentry/github-workflows/updater@607fed74f812e69201531a5185b6c3c57caa4e89 # 3.4.0
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.path }}
          pattern: ${{ matrix.pattern }}
          changelog-entry: false
          api-token: ${{ secrets.CI_GITHUB_TOKEN }}
          ssh-key: ${{ secrets.CI_DEPLOY_KEY }}

  qt:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Qt LTS
            path: modules/qt-lts.properties
            pattern: '^v?6\.8\.\d+$'
          - name: Qt latest
            path: modules/qt-latest.properties
            pattern: '^v?6\.\d+\.\d+$'
    steps:
      - uses: getsentry/github-workflows/updater@607fed74f812e69201531a5185b6c3c57caa4e89 # 3.4.0
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.path }}
          pattern: ${{ matrix.pattern }}
          changelog-entry: false
          api-token: ${{ secrets.CI_GITHUB_TOKEN }}
          ssh-key: ${{ secrets.CI_DEPLOY_KEY }}
