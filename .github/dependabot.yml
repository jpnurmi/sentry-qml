version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps): "

  - package-ecosystem: npm
    directory: /tests/e2e/wasm
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps): "
    groups:
      wasm-e2e:
        patterns:
          - "*"
