name: E2E

on:
  pull_request:
  workflow_dispatch:
    inputs:
      self_hosted_ref:
        description: getsentry/self-hosted ref to test
        required: true
        default: "26.4.2"
      compose_profiles:
        description: Sentry self-hosted Docker Compose profile
        required: true
        type: choice
        default: feature-complete
        options:
          - feature-complete
          - errors-only

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Inproc (Qt LTS, ubuntu-24.04)
            sentry_backend: Inproc
            runner: ubuntu-24.04
            qt: LTS
            qt_host: linux
            qt_arch: linux_gcc_64
          - name: Crashpad (Qt LTS, ubuntu-24.04)
            sentry_backend: Crashpad
            runner: ubuntu-24.04
            qt: LTS
            qt_host: linux
            qt_arch: linux_gcc_64
          - name: Native (Qt latest, ubuntu-24.04)
            sentry_backend: Native
            runner: ubuntu-24.04
            qt: latest
            qt_host: linux
            qt_arch: linux_gcc_64
          - name: WebAssembly (Qt LTS, single-threaded)
            sentry_sdk: Wasm
            runner: ubuntu-24.04
            qt: LTS
            qt_host: all_os
            qt_target: wasm
            qt_arch: wasm_singlethread
            host_qt_host: linux
            host_qt_arch: linux_gcc_64
            cmake_toolchain_file: lib/cmake/Qt6/qt.toolchain.cmake
          - name: Android (Qt LTS, API 35)
            sentry_sdk: Android
            runner: ubuntu-24.04
            qt: LTS
            android_api: 35
            qt_host: linux
            qt_target: android
            qt_arch: android_x86_64
            cmake_toolchain_file: lib/cmake/Qt6/qt.toolchain.cmake
            cmake_target_args: -DANDROID_ABI=x86_64 -DANDROID_PLATFORM=android-28
    env:
      SENTRY_COMPOSE_PROFILES: ${{ inputs.compose_profiles || 'feature-complete' }}
      SENTRY_SELF_HOSTED_REF: ${{ inputs.self_hosted_ref || '26.4.2' }}
      SENTRY_TEST_URL: http://127.0.0.1:9000
      SENTRY_TEST_EMAIL: test@example.com
      SENTRY_TEST_PASSWORD: test123TEST
      SENTRY_APP_RUNNER_REF: d6f83b1ba5bfeb24a86ef5dd8d6cffa2ef4f56ab

    steps:
      - name: Check out sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Read Qt version
        id: qt
        shell: pwsh
        run: |
          $qtTrack = "${{ matrix.qt }}".ToLowerInvariant()
          $versionProperty = Get-Content "modules/qt-$qtTrack.properties" | Where-Object { $_ -match '^\s*version\s*=' } | Select-Object -First 1
          if (-not $versionProperty) { throw "Could not read Qt version" }
          $qtVersion = (($versionProperty -split '=', 2)[1]).Trim() -replace '^v', ''
          if (-not $qtVersion) { throw "Could not read Qt version" }
          "version=$qtVersion" >> $env:GITHUB_OUTPUT

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ steps.qt.outputs.version }}
          host: ${{ matrix.qt_host }}
          target: ${{ matrix.qt_target || 'desktop' }}
          arch: ${{ matrix.qt_arch }}
          cache: true
          install-deps: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Install host Qt
        if: matrix.qt_target
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ steps.qt.outputs.version }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          dir: ${{ runner.temp }}/qt-host
          cache: true
          install-deps: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Find target Qt paths
        if: matrix.qt_target
        id: qt-target-paths
        shell: pwsh
        run: |
          $hostPath = Get-ChildItem "${{ runner.temp }}/qt-host" -Directory -Recurse -Filter gcc_64 |
            Select-Object -First 1
          if (-not $hostPath) { throw "Could not find host Qt installation" }

          $targetPath = $null
          $roots = @(
            $env:GITHUB_WORKSPACE,
            (Split-Path $env:GITHUB_WORKSPACE -Parent),
            $env:RUNNER_TEMP,
            $env:RUNNER_TOOL_CACHE
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique
          foreach ($root in $roots) {
            $targetPath = Get-ChildItem $root -Directory -Recurse -Filter "${{ matrix.qt_arch }}" -ErrorAction SilentlyContinue |
              Select-Object -First 1
            if ($targetPath) { break }
          }
          if (-not $targetPath) { throw "Could not find target Qt installation" }

          "host_path=$($hostPath.FullName)" >> $env:GITHUB_OUTPUT
          "target_path=$($targetPath.FullName)" >> $env:GITHUB_OUTPUT

          $helperPath = Join-Path $targetPath.FullName 'lib/cmake/Qt6/QtPublicWasmToolchainHelpers.cmake'
          if (Test-Path $helperPath) {
            $helperText = Get-Content $helperPath -Raw
            if ($helperText -notmatch 'QT_EMCC_RECOMMENDED_VERSION\s+"([^"]+)"') {
              throw "Could not read recommended Emscripten version from $helperPath"
            }
            "emscripten_version=$($Matches[1])" >> $env:GITHUB_OUTPUT
          }

      - name: Check out emsdk
        if: matrix.sentry_sdk == 'Wasm'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: emscripten-core/emsdk
          path: emsdk
          persist-credentials: false

      - name: Install Emscripten
        if: matrix.sentry_sdk == 'Wasm'
        run: |
          "$GITHUB_WORKSPACE/emsdk/emsdk" install "${{ steps.qt-target-paths.outputs.emscripten_version }}"
          "$GITHUB_WORKSPACE/emsdk/emsdk" activate "${{ steps.qt-target-paths.outputs.emscripten_version }}"
          echo "EMSDK=$GITHUB_WORKSPACE/emsdk" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/emsdk" >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Install Crashpad dependencies
        if: matrix.sentry_backend == 'Crashpad' && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure Sentry QML
        if: ${{ !matrix.qt_target }}
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DSENTRY_BACKEND=${{ matrix.sentry_backend }}
          -DSENTRY_QML_BUILD_E2E_TESTS=ON

      - name: Configure Sentry QML for target platform
        if: matrix.qt_target
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_TOOLCHAIN_FILE="${{ steps.qt-target-paths.outputs.target_path }}/${{ matrix.cmake_toolchain_file }}"
          -DQT_HOST_PATH="${{ steps.qt-target-paths.outputs.host_path }}"
          -DSENTRY_QML_SDK=${{ matrix.sentry_sdk }}
          ${{ matrix.cmake_target_args }}
          -DSENTRY_QML_BUILD_E2E_TESTS=ON

      - name: Build E2E app
        run: |
          target=sentry_qml_e2e_app
          if [ "${{ matrix.qt_target }}" = "android" ]; then
            target=sentry_qml_e2e_app_make_apk
          fi
          cmake --build build --target "$target" --config RelWithDebInfo --parallel

      - name: Install WebAssembly E2E dependencies
        if: matrix.sentry_sdk == 'Wasm'
        working-directory: tests/e2e/wasm
        run: npm ci

      - name: Build WebAssembly Sentry browser bundle
        if: matrix.sentry_sdk == 'Wasm'
        working-directory: tests/e2e/wasm
        run: npm run build:sentry

      - name: Install WebAssembly browser
        if: matrix.sentry_sdk == 'Wasm'
        working-directory: tests/e2e/wasm
        run: npx playwright install --with-deps chromium

      - name: Find Android E2E APK
        if: matrix.qt_target == 'android'
        id: android-apk
        shell: pwsh
        run: |
          $apk = Get-ChildItem build -Filter '*.apk' -Recurse |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $apk) { throw "Could not find Android E2E APK" }
          "path=$($apk.FullName)" >> $env:GITHUB_OUTPUT

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/.ghcup
          if [ "$RUNNER_OS" = "Linux" ] && [ "${{ matrix.qt_target }}" != "android" ]; then
            sudo rm -rf /home/runner/Android /usr/local/lib/android /opt/android /usr/local/android-sdk
          fi
          sudo rm -rf /usr/share/dotnet /usr/share/doc/dotnet-*
          df -h

      - name: Check out Sentry self-hosted
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: getsentry/self-hosted
          ref: ${{ env.SENTRY_SELF_HOSTED_REF }}
          path: self-hosted
          persist-credentials: false

      - name: Check out Sentry app-runner
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: getsentry/app-runner
          ref: ${{ env.SENTRY_APP_RUNNER_REF }}
          path: app-runner
          persist-credentials: false

      - name: Configure Sentry self-hosted
        working-directory: self-hosted
        run: |
          cat > .env.custom <<EOF
          COMPOSE_PROFILES=$SENTRY_COMPOSE_PROFILES
          SENTRY_BIND=127.0.0.1:9000
          SENTRY_EVENT_RETENTION_DAYS=1
          EOF

      - name: Restore Sentry self-hosted volume cache
        id: restore-self-hosted-volumes
        uses: BYK/docker-volume-cache-action/restore@0efa5cf5178c9906cb46ed8d1a357df8fd6b1a06 # v1
        with:
          key: sentry-qml-e2e-volumes-v1-${{ runner.arch }}-${{ env.SENTRY_SELF_HOSTED_REF }}-${{ env.SENTRY_COMPOSE_PROFILES }}
          volumes: |
            sentry-postgres
            sentry-clickhouse
            sentry-kafka

      - name: Install Sentry self-hosted
        working-directory: self-hosted
        env:
          REPORT_SELF_HOSTED_ISSUES: 0
          SKIP_SENTRY_MIGRATIONS: ${{ steps.restore-self-hosted-volumes.outputs.cache-hit == 'true' && '1' || '' }}
          SKIP_SNUBA_MIGRATIONS: ${{ steps.restore-self-hosted-volumes.outputs.cache-hit == 'true' && '1' || '' }}
        run: ./install.sh --no-report-self-hosted-issues --skip-user-creation --skip-commit-check

      - name: Enable Sentry E2E feature flags
        working-directory: self-hosted
        run: |
          cat >> sentry/sentry.conf.py <<'EOF'

          SENTRY_FEATURES.update(
              {
                  "organizations:tracemetrics-ingestion": True,
              }
          )
          EOF

      - name: Save Sentry self-hosted volume cache
        if: github.event_name != 'pull_request' && steps.restore-self-hosted-volumes.outputs.cache-hit != 'true'
        uses: BYK/docker-volume-cache-action/save@0efa5cf5178c9906cb46ed8d1a357df8fd6b1a06 # v1
        with:
          key: sentry-qml-e2e-volumes-v1-${{ runner.arch }}-${{ env.SENTRY_SELF_HOSTED_REF }}-${{ env.SENTRY_COMPOSE_PROFILES }}
          volumes: |
            sentry-postgres
            sentry-clickhouse
            sentry-kafka

      - name: Set up swap
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show
          free -h

      - name: Start Sentry self-hosted
        working-directory: self-hosted
        run: docker compose --ansi never --env-file .env --env-file .env.custom up --wait

      - name: Create Sentry test user
        working-directory: self-hosted
        run: |
          docker compose --ansi never --env-file .env --env-file .env.custom exec -T web sentry createuser \
            --force-update \
            --superuser \
            --email "$SENTRY_TEST_EMAIL" \
            --password "$SENTRY_TEST_PASSWORD" \
            --no-input

      - name: Configure Sentry test project
        id: sentry
        run: |
          python3 tests/e2e/sentry_self_hosted.py \
            --base-url "$SENTRY_TEST_URL" \
            --email "$SENTRY_TEST_EMAIL" \
            --password "$SENTRY_TEST_PASSWORD" \
            configure

      - name: Run Sentry QML E2E tests
        if: ${{ !matrix.qt_target }}
        shell: pwsh
        run: Invoke-Pester tests/e2e/Integration.Tests.ps1 -CI
        env:
          SENTRY_APP_RUNNER_PATH: ${{ github.workspace }}/app-runner
          SENTRY_AUTH_TOKEN: ${{ steps.sentry.outputs.auth_token }}
          SENTRY_QML_E2E_DSN: ${{ steps.sentry.outputs.dsn }}
          SENTRY_QML_E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          SENTRY_QML_E2E_APP_PATH: ${{ github.workspace }}/build/tests/sentry_qml_e2e_app
          SENTRY_QML_E2E_DATABASE_PATH: ${{ runner.temp }}/sentry-qml-e2e-db

      - name: Run Sentry QML WebAssembly tests
        if: matrix.sentry_sdk == 'Wasm'
        shell: pwsh
        run: Invoke-Pester tests/e2e/Integration.Tests.ps1 -CI
        env:
          SENTRY_APP_RUNNER_PATH: ${{ github.workspace }}/app-runner
          SENTRY_AUTH_TOKEN: ${{ steps.sentry.outputs.auth_token }}
          SENTRY_QML_E2E_DSN: ${{ steps.sentry.outputs.dsn }}
          SENTRY_QML_E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          SENTRY_QML_E2E_APP_PATH: ${{ github.workspace }}/build/tests/sentry_qml_e2e_app.html
          SENTRY_QML_E2E_DATABASE_PATH: sentry-qml-e2e-db
          SENTRY_QML_E2E_PLATFORM: WasmBrowser

      - name: Enable KVM group perms
        if: matrix.qt_target == 'android'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Sentry QML Android tests
        if: matrix.qt_target == 'android'
        id: first-android-e2e-run
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with: &android-e2e-run
          api-level: ${{ matrix.android_api }}
          target: google_apis
          arch: x86_64
          script: pwsh -NoLogo -NoProfile -Command "Invoke-Pester tests/e2e/Integration.Tests.ps1 -CI"
        env: &android-e2e-env
          SENTRY_APP_RUNNER_PATH: ${{ github.workspace }}/app-runner
          SENTRY_AUTH_TOKEN: ${{ steps.sentry.outputs.auth_token }}
          SENTRY_QML_E2E_DSN: ${{ steps.sentry.outputs.dsn }}
          SENTRY_QML_E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          SENTRY_QML_E2E_APP_PACKAGE_PATH: ${{ steps.android-apk.outputs.path }}
          SENTRY_QML_E2E_APP_PATH: io.sentry.qml.e2e/org.qtproject.qt.android.bindings.QtActivity
          SENTRY_QML_E2E_DATABASE_PATH: /data/data/io.sentry.qml.e2e/cache/sentry-qml-e2e-db
          SENTRY_QML_E2E_PLATFORM: Adb

      - name: Retry Sentry QML Android tests
        if: matrix.qt_target == 'android' && steps.first-android-e2e-run.outcome == 'failure'
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with: *android-e2e-run
        env: *android-e2e-env

      - name: Inspect Sentry failure
        if: failure()
        run: |
          test -d self-hosted || exit 0
          cd self-hosted
          docker compose --ansi never --env-file .env --env-file .env.custom ps
          docker compose --ansi never --env-file .env --env-file .env.custom logs --tail=300

      - name: Upload E2E output
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sentry-qml-e2e-output
          path: tests/e2e/output/
          if-no-files-found: ignore

      - name: Stop Sentry self-hosted
        if: always()
        run: |
          test -d self-hosted || exit 0
          cd self-hosted
          docker compose --ansi never --env-file .env --env-file .env.custom down --remove-orphans || true
