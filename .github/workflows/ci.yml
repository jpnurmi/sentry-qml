name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: ${{ matrix.sentry_sdk }} (Qt ${{ matrix.qt_version }}, ${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # List available Qt versions and architectures with:
        #   pipx run aqtinstall aqt list-qt linux desktop
        #   pipx run aqtinstall aqt list-qt linux_arm64 desktop
        #   pipx run aqtinstall aqt list-qt mac desktop
        #   pipx run aqtinstall aqt list-qt windows desktop
        #   pipx run aqtinstall aqt list-qt linux desktop --arch 6.11.0
        include:
          - runner: ubuntu-24.04
            label: Linux x64
            qt_version: "6.8.0"
            qt_host: linux
            qt_arch: linux_gcc_64
            sentry_sdk: Native
          - runner: ubuntu-24.04
            label: Linux x64
            qt_version: "6.11.0"
            qt_host: linux
            qt_arch: linux_gcc_64
            sentry_sdk: Native
          - runner: ubuntu-24.04-arm
            label: Linux ARM64
            qt_version: "6.8.0"
            qt_host: linux_arm64
            qt_arch: linux_gcc_arm64
            sentry_sdk: Native
          - runner: ubuntu-24.04-arm
            label: Linux ARM64
            qt_version: "6.11.0"
            qt_host: linux_arm64
            qt_arch: linux_gcc_arm64
            sentry_sdk: Native
          - runner: macos-15
            label: macOS Universal
            qt_version: "6.8.0"
            qt_host: mac
            qt_arch: clang_64
            sentry_sdk: Native
          - runner: macos-15
            label: macOS Universal
            qt_version: "6.8.0"
            qt_host: mac
            qt_arch: clang_64
            sentry_sdk: Cocoa
          - runner: macos-26
            label: macOS Universal
            qt_version: "6.11.0"
            qt_host: mac
            qt_arch: clang_64
            sentry_sdk: Native
          - runner: macos-26
            label: macOS Universal
            qt_version: "6.11.0"
            qt_host: mac
            qt_arch: clang_64
            sentry_sdk: Cocoa
          - runner: windows-2025
            label: Windows x64
            qt_version: "6.8.0"
            qt_host: windows
            qt_arch: win64_msvc2022_64
            sentry_sdk: Native
          - runner: windows-2025
            label: Windows x64
            qt_version: "6.11.0"
            qt_host: windows
            qt_arch: win64_msvc2022_64
            sentry_sdk: Native
          - runner: windows-11-arm
            label: Windows ARM64
            qt_version: "6.8.0"
            qt_host: windows
            qt_arch: win64_msvc2022_arm64_cross_compiled
            sentry_sdk: Native
          - runner: windows-11-arm
            label: Windows ARM64
            qt_version: "6.11.0"
            qt_host: windows
            qt_arch: win64_msvc2022_arm64_cross_compiled
            sentry_sdk: Native

    steps:
      - name: Check out sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ matrix.qt_version }}
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          cache: true
          install-deps: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Configure Native
        if: matrix.sentry_sdk == 'Native'
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DSENTRY_QML_SDK=${{ matrix.sentry_sdk }}
          ${{ runner.os == 'macOS' && '-DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"' || '' }}
          -DSENTRY_QML_TEST_JUNIT=ON

      - name: Configure Cocoa
        if: matrix.sentry_sdk == 'Cocoa'
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DSENTRY_QML_SDK=${{ matrix.sentry_sdk }}
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          -DSENTRY_QML_TEST_JUNIT=ON

      - name: Build
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Verify macOS universal binaries
        if: runner.os == 'macOS'
        run: |
          lipo build/src/libSentryQml.dylib -verify_arch arm64 x86_64
          if [ "${{ matrix.sentry_sdk }}" = "Native" ]; then
            lipo build/sentry-native/libsentry.a -verify_arch arm64 x86_64
            lipo build/sentry-native/sentry-crash -verify_arch arm64 x86_64
          else
            lipo \
              build/sentry-cocoa/SentryObjC-Dynamic.xcframework/macos-arm64_x86_64/SentryObjC.framework/SentryObjC \
              -verify_arch arm64 x86_64
          fi

      - name: Test
        run: ctest --test-dir build --build-config RelWithDebInfo --verbose --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: ${{ matrix.sentry_sdk }} (Qt ${{ matrix.qt_version }}, ${{ matrix.label }})
          path: build/tests/test-results/*.xml
          reporter: java-junit
