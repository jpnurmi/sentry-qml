name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      qt_version:
        description: Qt version to install
        required: true
        default: "6.11.0"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.runner }}, Qt ${{ matrix.qt_version }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-26
          - macos-26-intel
          - windows-2025
          - windows-11-arm
        qt_version: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', inputs.qt_version) || '["6.8.0","6.11.0"]') }}

    steps:
      - name: Check out sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install system dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libcurl4-openssl-dev

      - name: Select Qt package
        id: qt
        shell: bash
        run: |
          case "${{ matrix.runner }}" in
            ubuntu-24.04)
              host=linux
              arch=linux_gcc_64
              ;;
            ubuntu-24.04-arm)
              host=linux_arm64
              arch=linux_gcc_arm64
              ;;
            macos-26)
              host=mac
              arch=clang_64
              ;;
            macos-26-intel)
              host=mac
              arch=clang_64
              ;;
            windows-2025)
              host=windows
              arch=win64_msvc2022_64
              ;;
            windows-11-arm)
              host=windows
              arch=win64_msvc2022_arm64_cross_compiled
              ;;
          esac

          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "arch=$arch" >> "$GITHUB_OUTPUT"
          echo "Qt ${{ matrix.qt_version }}: $host $arch"

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ matrix.qt_version }}
          host: ${{ steps.qt.outputs.host }}
          target: desktop
          arch: ${{ steps.qt.outputs.arch }}
          cache: true
          install-deps: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Test
        run: ctest --test-dir build --build-config RelWithDebInfo --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen
