name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ${{ matrix.sentry_backend }} (Qt ${{ matrix.qt.track }}, ${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # List available Qt versions and architectures with:
        #   pipx run aqtinstall aqt list-qt linux desktop
        #   pipx run aqtinstall aqt list-qt linux_arm64 desktop
        #   pipx run aqtinstall aqt list-qt mac desktop
        #   pipx run aqtinstall aqt list-qt windows desktop
        #   pipx run aqtinstall aqt list-qt linux desktop --arch 6.11.0
        #   pipx run aqtinstall aqt list-qt all_os wasm --arch 6.11.0
        include:
          - {sentry_backend: Inproc, runner: ubuntu-24.04, qt: {track: LTS, host: linux, target: desktop, arch: linux_gcc_64, archives: "icu qtbase qtdeclarative"}}
          - {sentry_backend: Crashpad, runner: ubuntu-24.04, qt: {track: LTS, host: linux, target: desktop, arch: linux_gcc_64, archives: "icu qtbase qtdeclarative"}}
          - {sentry_backend: Native, runner: ubuntu-24.04, qt: {track: latest, host: linux, target: desktop, arch: linux_gcc_64, archives: "icu qtbase qtdeclarative"}}

          - {sentry_backend: Inproc, runner: ubuntu-24.04-arm, qt: {track: LTS, host: linux_arm64, target: desktop, arch: linux_gcc_arm64, archives: "icu qtbase qtdeclarative"}}
          - {sentry_backend: Crashpad, runner: ubuntu-24.04-arm, qt: {track: LTS, host: linux_arm64, target: desktop, arch: linux_gcc_arm64, archives: "icu qtbase qtdeclarative"}}
          - {sentry_backend: Native, runner: ubuntu-24.04-arm, qt: {track: latest, host: linux_arm64, target: desktop, arch: linux_gcc_arm64, archives: "icu qtbase qtdeclarative"}}

          - {sentry_backend: Cocoa, runner: macos-15, qt: {track: LTS, host: mac, target: desktop, arch: clang_64, archives: "qtbase qtdeclarative"}}
          - {sentry_backend: Cocoa, runner: macos-26, qt: {track: latest, host: mac, target: desktop, arch: clang_64, archives: "qtbase qtdeclarative"}}
          - {sentry_backend: Inproc, runner: macos-15, qt: {track: LTS, host: mac, target: desktop, arch: clang_64, archives: "qtbase qtdeclarative"}}
          - {sentry_backend: Crashpad, runner: macos-15, qt: {track: LTS, host: mac, target: desktop, arch: clang_64, archives: "qtbase qtdeclarative"}}
          - {sentry_backend: Native, runner: macos-26, qt: {track: latest, host: mac, target: desktop, arch: clang_64, archives: "qtbase qtdeclarative"}}

          - {sentry_backend: Inproc, runner: windows-2022, qt: {track: LTS, host: windows, target: desktop, arch: win64_msvc2022_64, archives: "qtbase qtdeclarative"}}
          - {sentry_backend: Crashpad, runner: windows-2022, qt: {track: LTS, host: windows, target: desktop, arch: win64_msvc2022_64, archives: "qtbase qtdeclarative"}}
          - {sentry_backend: Native, runner: windows-2025, qt: {track: latest, host: windows, target: desktop, arch: win64_msvc2022_64, archives: "qtbase qtdeclarative"}}

          - {sentry_backend: Inproc, runner: windows-11-arm, qt: {track: LTS, host: windows, target: desktop, arch: win64_msvc2022_arm64_cross_compiled, archives: "qtbase qtdeclarative"}}
          - {sentry_backend: Crashpad, runner: windows-11-arm, qt: {track: LTS, host: windows, target: desktop, arch: win64_msvc2022_arm64_cross_compiled, archives: "qtbase qtdeclarative"}}
          - {sentry_backend: Native, runner: windows-11-arm, qt: {track: latest, host: windows, target: desktop, arch: win64_msvc2022_arm64_cross_compiled, archives: "qtbase qtdeclarative"}}

    steps:
      - name: Check out sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Read Qt version
        id: qt
        shell: pwsh
        run: |
          $qtTrack = "${{ matrix.qt.track }}".ToLowerInvariant()
          $versionProperty = Get-Content "modules/qt-$qtTrack.properties" | Where-Object { $_ -match '^\s*version\s*=' } | Select-Object -First 1
          if (-not $versionProperty) { throw "Could not read Qt version" }
          $qtVersion = (($versionProperty -split '=', 2)[1]).Trim() -replace '^v', ''
          if (-not $qtVersion) { throw "Could not read Qt version" }
          "version=$qtVersion" >> $env:GITHUB_OUTPUT

      - name: Read Sentry module cache keys
        id: sentry-module-cache
        shell: pwsh
        run: |
          $sentryNativeSha = & git -C modules/sentry-native rev-parse HEAD
          if ($LASTEXITCODE -ne 0 -or -not $sentryNativeSha) { throw "Could not read sentry-native SHA" }

          $sentryCocoaSha = & git -C modules/sentry-cocoa rev-parse HEAD
          if ($LASTEXITCODE -ne 0 -or -not $sentryCocoaSha) { throw "Could not read sentry-cocoa SHA" }

          "sentry-native-sha=$sentryNativeSha" >> $env:GITHUB_OUTPUT
          "sentry-cocoa-sha=$sentryCocoaSha" >> $env:GITHUB_OUTPUT

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ steps.qt.outputs.version }}
          host: ${{ matrix.qt.host }}
          target: ${{ matrix.qt.target }}
          arch: ${{ matrix.qt.arch }}
          archives: ${{ matrix.qt.archives }}
          cache: true
          install-deps: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Restore Sentry Native cache
        if: ${{ contains(fromJSON('["Native", "Inproc", "Crashpad", "Breakpad"]'), matrix.sentry_backend) }}
        id: sentry-native-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/sentry-native
          key: sentry-native-${{ matrix.runner }}-${{ matrix.qt.arch }}-${{ matrix.sentry_backend }}-${{ steps.sentry-module-cache.outputs.sentry-native-sha }}-${{ hashFiles('modules/qt-*.properties', 'cmake/native.cmake') }}
          restore-keys: |
            sentry-native-${{ matrix.runner }}-${{ matrix.qt.arch }}-${{ matrix.sentry_backend }}-${{ steps.sentry-module-cache.outputs.sentry-native-sha }}-

      - name: Restore SentryObjC cache
        if: matrix.sentry_backend == 'Cocoa'
        id: sentryobjc-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/sentry-cocoa
          key: sentryobjc-${{ matrix.runner }}-${{ steps.sentry-module-cache.outputs.sentry-cocoa-sha }}-${{ hashFiles('cmake/cocoa.cmake', 'cmake/sentry-cocoa.cmake') }}
          restore-keys: |
            sentryobjc-${{ matrix.runner }}-${{ steps.sentry-module-cache.outputs.sentry-cocoa-sha }}-

      - name: Install Crashpad dependencies
        if: matrix.sentry_backend == 'Crashpad' && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DSENTRY_BACKEND=${{ matrix.sentry_backend }}
          ${{ runner.os == 'macOS' && '-DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"' || '' }}
          -DSENTRY_QML_TEST_JUNIT=ON

      - name: Build
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Save Sentry Native cache
        if: ${{ contains(fromJSON('["Native", "Inproc", "Crashpad", "Breakpad"]'), matrix.sentry_backend) && steps.sentry-native-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/sentry-native
          key: ${{ steps.sentry-native-cache.outputs.cache-primary-key }}

      - name: Save SentryObjC cache
        if: matrix.sentry_backend == 'Cocoa' && steps.sentryobjc-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/sentry-cocoa
          key: ${{ steps.sentryobjc-cache.outputs.cache-primary-key }}

      - name: Verify macOS universal binaries
        if: runner.os == 'macOS'
        run: |
          lipo build/src/libSentryQml.dylib -verify_arch arm64 x86_64
          if [ "${{ matrix.sentry_backend }}" = "Cocoa" ]; then
            lipo \
              build/sentry-cocoa/SentryObjC-Dynamic.xcframework/macos-arm64_x86_64/SentryObjC.framework/SentryObjC \
              -verify_arch arm64 x86_64
          else
            lipo build/sentry-native/libsentry.a -verify_arch arm64 x86_64
            if [ "${{ matrix.sentry_backend }}" = "Native" ]; then
              lipo build/sentry-native/sentry-crash -verify_arch arm64 x86_64
            fi
          fi

      - name: Test
        id: test
        run: ctest --test-dir build --build-config RelWithDebInfo --verbose --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Publish test results
        if: always() && steps.test.outcome != 'skipped'
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: ${{ matrix.sentry_backend }} (Qt ${{ matrix.qt.track }}, ${{ matrix.runner }})
          path: build/tests/test-results/*.xml
          reporter: java-junit

  wasm:
    name: WebAssembly (Qt ${{ matrix.qt.track }}, ${{ matrix.variant }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - {variant: single-threaded, qt: {track: LTS, host: all_os, target: wasm, arch: wasm_singlethread, archives: "qtbase qtdeclarative"}, host_qt: {host: linux, arch: linux_gcc_64, path: gcc_64, archives: icu}}
          - {variant: multi-threaded, qt: {track: latest, host: all_os, target: wasm, arch: wasm_multithread, archives: "qtbase qtdeclarative"}, host_qt: {host: linux, arch: linux_gcc_64, path: gcc_64, archives: icu}}

    steps:
      - name: Check out sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Read Qt version
        id: qt
        shell: pwsh
        run: |
          $qtTrack = "${{ matrix.qt.track }}".ToLowerInvariant()
          $versionProperty = Get-Content "modules/qt-$qtTrack.properties" | Where-Object { $_ -match '^\s*version\s*=' } | Select-Object -First 1
          if (-not $versionProperty) { throw "Could not read Qt version" }
          $qtVersion = (($versionProperty -split '=', 2)[1]).Trim() -replace '^v', ''
          if (-not $qtVersion) { throw "Could not read Qt version" }
          "version=$qtVersion" >> $env:GITHUB_OUTPUT

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ steps.qt.outputs.version }}
          host: ${{ matrix.qt.host }}
          target: ${{ matrix.qt.target }}
          arch: ${{ matrix.qt.arch }}
          archives: ${{ matrix.qt.archives }}
          cache: true
          install-deps: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Install host Qt ICU archive
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ steps.qt.outputs.version }}
          host: ${{ matrix.host_qt.host }}
          target: desktop
          arch: ${{ matrix.host_qt.arch }}
          archives: ${{ matrix.host_qt.archives }}
          cache: false
          install-deps: false
          set-env: false
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Find wasm Qt paths
        id: wasm-qt-paths
        shell: pwsh
        run: |
          $roots = @(
            $env:GITHUB_WORKSPACE,
            (Split-Path $env:GITHUB_WORKSPACE -Parent),
            $env:RUNNER_TEMP,
            $env:RUNNER_TOOL_CACHE
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique

          $wasmPath = $null
          foreach ($root in $roots) {
            $wasmPath = Get-ChildItem $root -Directory -Recurse -Filter "${{ matrix.qt.arch }}" -ErrorAction SilentlyContinue |
              Where-Object { Test-Path (Join-Path $_.FullName 'lib/cmake/Qt6/qt.toolchain.cmake') } |
              Select-Object -First 1
            if ($wasmPath) { break }
          }
          if (-not $wasmPath) { throw "Could not find wasm Qt installation" }

          $hostPath = $null
          foreach ($root in $roots) {
            $hostPath = Get-ChildItem $root -Directory -Recurse -Filter "${{ matrix.host_qt.path }}" -ErrorAction SilentlyContinue |
              Where-Object {
                (Test-Path (Join-Path $_.FullName 'bin/qt-cmake')) -and
                (Test-Path (Join-Path $_.FullName 'lib/cmake/Qt6/Qt6Config.cmake'))
              } |
              Select-Object -First 1
            if ($hostPath) { break }
          }
          if (-not $hostPath) { throw "Could not find host Qt installation" }

          "host_path=$($hostPath.FullName)" >> $env:GITHUB_OUTPUT
          "wasm_path=$($wasmPath.FullName)" >> $env:GITHUB_OUTPUT

          $helperPath = Join-Path $wasmPath.FullName 'lib/cmake/Qt6/QtPublicWasmToolchainHelpers.cmake'
          $helperText = Get-Content $helperPath -Raw
          if ($helperText -notmatch 'QT_EMCC_RECOMMENDED_VERSION\s+"([^"]+)"') {
            throw "Could not read recommended Emscripten version from $helperPath"
          }

          "emscripten_version=$($Matches[1])" >> $env:GITHUB_OUTPUT

      - name: Check out emsdk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: emscripten-core/emsdk
          path: emsdk
          persist-credentials: false

      - name: Restore Emscripten cache
        id: emsdk-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            emsdk/.emscripten
            emsdk/.emscripten_cache
            emsdk/.emscripten_sanity
            emsdk/downloads
            emsdk/node
            emsdk/python
            emsdk/upstream
          key: emsdk-${{ runner.os }}-${{ steps.wasm-qt-paths.outputs.emscripten_version }}

      - name: Install Emscripten
        run: |
          "$GITHUB_WORKSPACE/emsdk/emsdk" install "${{ steps.wasm-qt-paths.outputs.emscripten_version }}"
          "$GITHUB_WORKSPACE/emsdk/emsdk" activate "${{ steps.wasm-qt-paths.outputs.emscripten_version }}"
          echo "EMSDK=$GITHUB_WORKSPACE/emsdk" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/emsdk" >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Save Emscripten cache
        if: steps.emsdk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            emsdk/.emscripten
            emsdk/.emscripten_cache
            emsdk/.emscripten_sanity
            emsdk/downloads
            emsdk/node
            emsdk/python
            emsdk/upstream
          key: ${{ steps.emsdk-cache.outputs.cache-primary-key }}

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_TOOLCHAIN_FILE="${{ steps.wasm-qt-paths.outputs.wasm_path }}/lib/cmake/Qt6/qt.toolchain.cmake"
          -DQT_HOST_PATH="${{ steps.wasm-qt-paths.outputs.host_path }}"
          -DSENTRY_QML_BUILD_E2E_TESTS=ON
          -DSENTRY_QML_TEST_JUNIT=ON

      - name: Build wasm artifacts
        run: >
          cmake --build build
          --target
          SentryQml
          sentry_qml_example
          tst_unit
          tst_integration
          sentry_qml_e2e_app
          --config RelWithDebInfo
          --parallel

      - name: Restore WebAssembly npm cache
        id: wasm-npm-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: wasm-npm-${{ runner.os }}-${{ hashFiles('tests/e2e/wasm/package-lock.json') }}

      - name: Install WebAssembly test dependencies
        working-directory: tests/e2e/wasm
        run: npm ci

      - name: Save WebAssembly npm cache
        if: steps.wasm-npm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: ${{ steps.wasm-npm-cache.outputs.cache-primary-key }}

      - name: Build WebAssembly Sentry browser bundle
        working-directory: tests/e2e/wasm
        run: npm run build:sentry

      - name: Restore WebAssembly browser cache
        id: wasm-browser-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: wasm-playwright-${{ runner.os }}-${{ hashFiles('tests/e2e/wasm/package-lock.json') }}

      - name: Install WebAssembly browser
        working-directory: tests/e2e/wasm
        run: npx playwright install --with-deps chromium

      - name: Save WebAssembly browser cache
        if: steps.wasm-browser-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ steps.wasm-browser-cache.outputs.cache-primary-key }}

      - name: Test wasm artifacts
        run: |
          set -euo pipefail
          for test in tst_unit tst_integration tst_crash; do
            if [ -f "build/tests/${test}.js" ]; then
              node tests/e2e/wasm/run-qttest.mjs "build/tests/${test}.js" -- -txt
            else
              echo "::notice::Skipping ${test}; no wasm artifact was built"
            fi
          done

  android:
    name: Android (Qt ${{ matrix.qt.track }}, API ${{ matrix.android_api }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - {qt: {track: LTS, host: linux, target: android, arch: android_x86_64, archives: "qtbase qtdeclarative"}, host_qt: {host: linux, arch: linux_gcc_64, path: gcc_64, archives: icu}, android_api: 28}
          - {qt: {track: latest, host: linux, target: android, arch: android_x86_64, archives: "qtbase qtdeclarative"}, host_qt: {host: linux, arch: linux_gcc_64, path: gcc_64, archives: icu}, android_api: 36}

    steps:
      - name: Check out sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Read Qt version
        id: qt
        shell: pwsh
        run: |
          $qtTrack = "${{ matrix.qt.track }}".ToLowerInvariant()
          $versionProperty = Get-Content "modules/qt-$qtTrack.properties" | Where-Object { $_ -match '^\s*version\s*=' } | Select-Object -First 1
          if (-not $versionProperty) { throw "Could not read Qt version" }
          $qtVersion = (($versionProperty -split '=', 2)[1]).Trim() -replace '^v', ''
          if (-not $qtVersion) { throw "Could not read Qt version" }
          "version=$qtVersion" >> $env:GITHUB_OUTPUT

      - name: Install Android Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ steps.qt.outputs.version }}
          host: ${{ matrix.qt.host }}
          target: ${{ matrix.qt.target }}
          arch: ${{ matrix.qt.arch }}
          archives: ${{ matrix.qt.archives }}
          dir: ${{ runner.temp }}/qt-android
          cache: true
          install-deps: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Install host Qt ICU archive
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ steps.qt.outputs.version }}
          host: ${{ matrix.host_qt.host }}
          target: desktop
          arch: ${{ matrix.host_qt.arch }}
          archives: ${{ matrix.host_qt.archives }}
          dir: ${{ runner.temp }}/qt-android
          cache: false
          install-deps: false
          set-env: false
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Find Android Qt paths
        id: android-qt-paths
        shell: pwsh
        run: |
          $hostPath = Get-ChildItem "${{ runner.temp }}/qt-android" -Directory -Recurse -Filter "${{ matrix.host_qt.path }}" |
            Where-Object {
              (Test-Path (Join-Path $_.FullName 'bin/qt-cmake')) -and
              (Test-Path (Join-Path $_.FullName 'lib/cmake/Qt6/Qt6Config.cmake'))
            } |
            Select-Object -First 1
          if (-not $hostPath) { throw "Could not find host Qt installation" }

          $androidPath = Get-ChildItem "${{ runner.temp }}/qt-android" -Directory -Recurse -Filter "${{ matrix.qt.arch }}" |
            Select-Object -First 1
          if (-not $androidPath) { throw "Could not find Android Qt installation" }

          "host_path=$($hostPath.FullName)" >> $env:GITHUB_OUTPUT
          "android_path=$($androidPath.FullName)" >> $env:GITHUB_OUTPUT

      - name: Restore Gradle cache
        id: gradle-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ runner.arch }}-api-${{ matrix.android_api }}-${{ hashFiles('modules/qt-*.properties', 'cmake/android.cmake') }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ runner.arch }}-api-${{ matrix.android_api }}-
            gradle-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_TOOLCHAIN_FILE="${{ steps.android-qt-paths.outputs.android_path }}/lib/cmake/Qt6/qt.toolchain.cmake"
          -DQT_HOST_PATH="${{ steps.android-qt-paths.outputs.host_path }}"
          -DANDROID_ABI=x86_64
          -DANDROID_PLATFORM=android-28
          -DSENTRY_QML_TEST_JUNIT=ON

      - name: Build Android test APKs
        run: >
          cmake --build build
          --target
          tst_unit_make_apk
          tst_integration_make_apk
          --config RelWithDebInfo
          --parallel

      - name: Save Gradle cache
        if: steps.gradle-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ steps.gradle-cache.outputs.cache-primary-key }}

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/dotnet /usr/share/doc/dotnet-*
          df -h

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Test Android
        id: first-android-test-run
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with: &android-test-run
          api-level: ${{ matrix.android_api }}
          target: google_apis
          arch: x86_64
          script: |
            ctest --test-dir build --build-config RelWithDebInfo --repeat until-pass:2 --verbose --output-on-failure --output-junit "$GITHUB_WORKSPACE/build/tests/test-results/ctest-android.xml"

      - name: Retry Android tests
        if: steps.first-android-test-run.outcome == 'failure'
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with: *android-test-run

      - name: Publish test results
        if: always() && steps.first-android-test-run.outcome != 'skipped'
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: Android (Qt ${{ matrix.qt.track }}, API ${{ matrix.android_api }})
          path: build/tests/test-results/*.xml
          reporter: java-junit

  ios:
    name: iOS (Qt ${{ matrix.qt.track }})
    runs-on: macos-15-intel
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - {qt: {track: LTS, host: mac, target: ios, arch: ios, archives: "qtbase qtdeclarative"}}

    steps:
      - name: Check out sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Read Qt version
        id: qt
        shell: pwsh
        run: |
          $qtTrack = "${{ matrix.qt.track }}".ToLowerInvariant()
          $versionProperty = Get-Content "modules/qt-$qtTrack.properties" | Where-Object { $_ -match '^\s*version\s*=' } | Select-Object -First 1
          if (-not $versionProperty) { throw "Could not read Qt version" }
          $qtVersion = (($versionProperty -split '=', 2)[1]).Trim() -replace '^v', ''
          if (-not $qtVersion) { throw "Could not read Qt version" }
          "version=$qtVersion" >> $env:GITHUB_OUTPUT

      - name: Install iOS Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ steps.qt.outputs.version }}
          host: ${{ matrix.qt.host }}
          target: ${{ matrix.qt.target }}
          arch: ${{ matrix.qt.arch }}
          archives: ${{ matrix.qt.archives }}
          dir: ${{ runner.temp }}/qt-ios
          cache: true
          install-deps: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@75ea7944aeac985e226df0a882cd5b3470e51a97 # 3.3.1.dev107

      - name: Find Qt paths
        id: qt-paths
        shell: pwsh
        run: |
          $qtRoot = Join-Path "${{ runner.temp }}/qt-ios/Qt" "${{ steps.qt.outputs.version }}"
          $hostPath = Join-Path $qtRoot "macos"
          $iosPath = Join-Path $qtRoot "ios"

          if (-not (Test-Path (Join-Path $hostPath 'bin/qt-cmake')) -or
              -not (Test-Path (Join-Path $hostPath 'lib/cmake/Qt6/Qt6Config.cmake'))) {
            throw "Could not find host Qt installation at $hostPath"
          }

          if (-not (Test-Path (Join-Path $iosPath 'lib/cmake/Qt6/qt.toolchain.cmake'))) {
            throw "Could not find iOS Qt installation at $iosPath"
          }

          "host_path=$hostPath" >> $env:GITHUB_OUTPUT
          "ios_path=$iosPath" >> $env:GITHUB_OUTPUT

      - name: Read SentryObjC cache key
        id: sentryobjc-cache-key
        run: |
          sentry_cocoa_sha=$(git -C modules/sentry-cocoa rev-parse HEAD)
          xcode_hash=$(xcodebuild -version | shasum -a 256 | cut -d ' ' -f1)
          echo "key=sentryobjc-ios-${{ runner.os }}-${{ runner.arch }}-$xcode_hash-$sentry_cocoa_sha" >> "$GITHUB_OUTPUT"

      - name: Restore SentryObjC iOS XCFramework
        id: sentryobjc-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/sentry-cocoa
          key: ${{ steps.sentryobjc-cache-key.outputs.key }}

      - name: Build SentryObjC iOS XCFramework
        if: steps.sentryobjc-cache.outputs.cache-hit != 'true'
        run: |
          cd modules/sentry-cocoa
          ./scripts/build-xcframework-local.sh iOSOnly SentryObjCOnly
          mkdir -p "$RUNNER_TEMP/sentry-cocoa"
          ditto -x -k XCFrameworkBuildPath/SentryObjC-Dynamic.xcframework.zip "$RUNNER_TEMP/sentry-cocoa"

      - name: Save SentryObjC iOS XCFramework
        if: steps.sentryobjc-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/sentry-cocoa
          key: ${{ steps.sentryobjc-cache-key.outputs.key }}

      - name: Configure iOS
        run: >
          cmake -S . -B build -G Xcode
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_TOOLCHAIN_FILE="${{ steps.qt-paths.outputs.ios_path }}/lib/cmake/Qt6/qt.toolchain.cmake"
          -DQT_HOST_PATH="${{ steps.qt-paths.outputs.host_path }}"
          -DCMAKE_SYSTEM_NAME=iOS
          -DCMAKE_OSX_SYSROOT=iphonesimulator
          -DCMAKE_OSX_ARCHITECTURES=x86_64
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO
          -DSENTRY_COCOA_XCFRAMEWORK="$RUNNER_TEMP/sentry-cocoa/SentryObjC-Dynamic.xcframework"
          -DSENTRY_QML_TEST_JUNIT=ON

      - name: Build iOS tests
        run: >
          cmake --build build
          --target tst_unit tst_integration
          --config RelWithDebInfo
          --parallel

      - name: Boot iOS simulator
        run: |
          device="$(xcrun simctl list devices booted | sed -n 's/.*(\([0-9A-Fa-f-]\{36\}\)) (Booted).*/\1/p' | head -n 1)"
          if [ -z "$device" ]; then
            device="$(xcrun simctl list devices available | sed -n 's/.*(\([0-9A-Fa-f-]\{36\}\)) (Shutdown).*/\1/p' | head -n 1)"
            if [ -z "$device" ]; then
              echo "No available iOS simulator found." >&2
              exit 69
            fi
            xcrun simctl boot "$device"
          fi
          xcrun simctl bootstatus "$device" -b
          echo "SENTRY_QML_IOS_SIMULATOR_UDID=$device" >> "$GITHUB_ENV"

      - name: Test iOS
        id: ios-tests
        run: |
          mkdir -p build/tests/test-results
          ctest --test-dir build \
            --build-config RelWithDebInfo \
            --verbose \
            --output-on-failure \
            --output-junit "$GITHUB_WORKSPACE/build/tests/test-results/ctest-ios.xml"

      - name: Publish test results
        if: always() && steps.ios-tests.outcome != 'skipped'
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: iOS (Qt ${{ matrix.qt.track }})
          path: build/tests/test-results/*.xml
          reporter: java-junit
          fail-on-empty: false
